image:
  repository: rophy/kube-federated-auth
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 8443

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Cluster role: central, sub-same-group, or sub-isolated
# central: knows all sub clusters (via 10.x)
# sub-same-group: knows sibling sub in same group (via 100.x)
# sub-isolated: only knows itself
clusterRole: central

# Cluster name for this deployment
clusterName: central

# Authorized clients (who can call this kube-federated-auth instance)
# Format: {cluster}/{namespace}/{serviceaccount}
# Use * as wildcard
authorizedClients:
  - "central/*/*"

# Cache configuration
cache:
  ttl: 60
  maxEntries: 1000

# Token renewal configuration
renewal:
  interval: "1h"
  tokenDuration: "168h"  # 7 days
  renewBefore: "48h"     # renew 48h before expiration

# Local cluster configuration (always present)
localCluster:
  issuer: "https://kubernetes.default.svc.cluster.local"
  caCertPath: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
  tokenPath: "/var/run/secrets/kubernetes.io/serviceaccount/token"

# Remote clusters configuration
# Each entry should have: name, issuer, apiServer, caCert, bootstrapToken
remoteClusters: []
# Example for central cluster knowing all subs via 10.x:
# - name: sub-1-1
#   issuer: "https://sub-1-1.internal:6443"
#   apiServer: "https://10.1.1.1:6443"
#   caCert: |
#     -----BEGIN CERTIFICATE-----
#     ...
#     -----END CERTIFICATE-----
#   bootstrapToken: "eyJhbGc..."
#
# Example for sub-1-1 knowing sub-1-2 via 100.x:
# - name: sub-1-2
#   issuer: "https://sub-1-2.internal:6443"
#   apiServer: "https://100.1.1.2:6443"
#   caCert: |
#     -----BEGIN CERTIFICATE-----
#     ...
#     -----END CERTIFICATE-----
#   bootstrapToken: "eyJhbGc..."

# ServiceAccount configuration
serviceAccount:
  create: true
  name: kube-federated-auth
  annotations: {}
