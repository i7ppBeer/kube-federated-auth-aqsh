{{- if .Values.remoteClusters }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-kube-federated-auth-certs
  labels:
    app: kube-federated-auth
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
type: Opaque
data:
  {{- range .Values.remoteClusters }}
  {{ .name }}-ca.crt: {{ .caCert | b64enc | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-kube-federated-auth-tokens
  labels:
    app: kube-federated-auth
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
type: Opaque
data:
  {{- range .Values.remoteClusters }}
  {{ .name }}-token: {{ .bootstrapToken | b64enc | quote }}
  {{- end }}
{{- end }}
