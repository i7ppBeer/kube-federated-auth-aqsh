apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-kube-federated-auth-config
  labels:
    app: kube-federated-auth
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
data:
  clusters.yaml: |
    authorized_clients:
    {{- range .Values.authorizedClients }}
      - {{ . | quote }}
    {{- end }}

    cache:
      ttl: {{ .Values.cache.ttl }}
      max_entries: {{ .Values.cache.maxEntries }}

    renewal:
      interval: {{ .Values.renewal.interval | quote }}
      token_duration: {{ .Values.renewal.tokenDuration | quote }}
      renew_before: {{ .Values.renewal.renewBefore | quote }}

    clusters:
      # Local cluster (self)
      {{ .Values.clusterName }}:
        issuer: {{ .Values.localCluster.issuer | quote }}
        ca_cert: {{ .Values.localCluster.caCertPath | quote }}
        token_path: {{ .Values.localCluster.tokenPath | quote }}

      {{- range .Values.remoteClusters }}
      # Remote cluster: {{ .name }}
      {{ .name }}:
        issuer: {{ .issuer | quote }}
        api_server: {{ .apiServer | quote }}
        ca_cert: "/etc/kube-federated-auth/ca-certs/{{ .name }}-ca.crt"
        token_path: "/etc/kube-federated-auth/tokens/{{ .name }}-token"
      {{- end }}
