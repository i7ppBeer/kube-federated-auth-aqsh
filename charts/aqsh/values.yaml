aqsh:
  image:
    repository: rophy/aqsh
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 1

  # Mode: "both", "api", or "worker"
  mode: both

  service:
    type: ClusterIP
    port: 8080

  # Identity and group headers (from reverse proxy/kube-auth-proxy)
  identityHeader: "X-Forwarded-User"
  groupsHeader: "X-Forwarded-Groups"
  requireIdentity: true

  # Tasks configuration
  # Define your tasks in tasks.yaml
  tasksConfig: |
    tasks:
      - name: example-task
        script: /scripts/example.sh
        description: "Example task"
        allowed_groups:
          - "system:authenticated"

  # Scripts to mount
  # You can provide your shell scripts here
  scripts: {}
  #  example.sh: |
  #    #!/bin/bash
  #    echo "Hello from aqsh"
  #    echo "Submitted by: $AQSH_SUBMITTER"

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

redis:
  enabled: true

  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 6379

  persistence:
    enabled: false
    # size: 1Gi
    # storageClass: ""

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

serviceAccount:
  create: true
  name: aqsh
  annotations: {}
