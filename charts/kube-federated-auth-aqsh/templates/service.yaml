apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-kube-federated-auth
  labels:
    app: kube-federated-auth-aqsh
    component: kube-federated-auth
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  type: {{ .Values.kubeFederatedAuth.service.type }}
  ports:
  - port: {{ .Values.kubeFederatedAuth.service.port }}
    targetPort: 8443
    protocol: TCP
    name: https
  selector:
    app: kube-federated-auth-aqsh
    release: {{ .Release.Name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-aqsh
  labels:
    app: kube-federated-auth-aqsh
    component: aqsh
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  type: {{ .Values.aqsh.service.type }}
  ports:
  - port: {{ .Values.aqsh.service.port }}
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: kube-federated-auth-aqsh
    release: {{ .Release.Name }}
