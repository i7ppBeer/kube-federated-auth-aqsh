{{- if .Values.kubeFederatedAuth.enabled }}
# ── kube-federated-auth Deployment ───────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-kube-federated-auth
  labels:
    app: kube-federated-auth-aqsh
    component: kube-federated-auth
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
  {{- with .Values.kubeFederatedAuth.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: kube-federated-auth-aqsh
      component: kube-federated-auth
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: kube-federated-auth-aqsh
        component: kube-federated-auth
        release: {{ .Release.Name }}
      {{- with .Values.kubeFederatedAuth.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: kube-federated-auth
        image: "{{ .Values.kubeFederatedAuth.image.repository }}:{{ .Values.kubeFederatedAuth.image.tag }}"
        imagePullPolicy: {{ .Values.kubeFederatedAuth.image.pullPolicy }}
        env:
        - name: CONFIG_PATH
          value: /etc/kube-federated-auth/clusters.yaml
        - name: PORT
          value: {{ .Values.kubeFederatedAuth.service.port | quote }}
        - name: SECRET_NAME
          value: {{ .Release.Name }}-kfa-credentials
        - name: NAMESPACE
          value: {{ .Release.Namespace }}
        ports:
        - containerPort: 8443
          name: http
          protocol: TCP
        resources:
          {{- toYaml .Values.kubeFederatedAuth.resources | nindent 10 }}
        livenessProbe:
          {{- toYaml .Values.kubeFederatedAuth.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.kubeFederatedAuth.readinessProbe | nindent 10 }}
        volumeMounts:
        - name: kfa-config
          mountPath: /etc/kube-federated-auth
          readOnly: true
        {{- if or (.Files.Glob "files/ca-certs/*.crt") .Values.kubeFederatedAuth.caCertsConfigMap.enabled (.Values.kubeFederatedAuth.remoteClusters) }}
        - name: kfa-ca-certs
          mountPath: /etc/kube-federated-auth/ca-certs
          readOnly: true
        {{- end }}
        {{- if .Values.kubeFederatedAuth.tokens.items }}
        - name: kfa-tokens
          mountPath: /etc/kube-federated-auth/tokens
          readOnly: true
        {{- end }}
      volumes:
      - name: kfa-config
        configMap:
          name: {{ .Release.Name }}-kfa-config
      {{- if .Files.Glob "files/ca-certs/*.crt" }}
      - name: kfa-ca-certs
        configMap:
          name: {{ .Release.Name }}-kfa-ca-certs
      {{- else if .Values.kubeFederatedAuth.caCertsConfigMap.enabled }}
      - name: kfa-ca-certs
        configMap:
          name: {{ .Release.Name }}-kfa-ca-certs
      {{- else if .Values.kubeFederatedAuth.remoteClusters }}
      - name: kfa-ca-certs
        configMap:
          name: {{ .Release.Name }}-kfa-certs
          items:
          {{- range .Values.kubeFederatedAuth.remoteClusters }}
          - key: {{ .name }}-ca.crt
            path: {{ .name }}-ca.crt
          {{- end }}
      {{- end }}
      {{- if .Values.kubeFederatedAuth.tokens.items }}
      - name: kfa-tokens
        secret:
          secretName: {{ .Values.kubeFederatedAuth.tokens.secretName | default (printf "%s-kfa-tokens" .Release.Name) }}
          items:
          {{- range .Values.kubeFederatedAuth.tokens.items }}
          - key: {{ . }}
            path: {{ . }}
          {{- end }}
      {{- end }}
{{- end }}
{{- if .Values.aqsh.enabled }}
---
# ── aqsh Deployment ────────────────────────────────────────────────────────��[...]
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-aqsh
  labels:
    app: kube-federated-auth-aqsh
    component: aqsh
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
  {{- with .Values.aqsh.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: kube-federated-auth-aqsh
      component: aqsh
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: kube-federated-auth-aqsh
        component: aqsh
        release: {{ .Release.Name }}
      {{- with .Values.aqsh.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: aqsh
        image: "{{ .Values.aqsh.image.repository }}:{{ .Values.aqsh.image.tag }}"
        imagePullPolicy: {{ .Values.aqsh.image.pullPolicy }}
        env:
        - name: AQSH_MODE
          value: {{ .Values.aqsh.mode | default "both" | quote }}
        - name: AQSH_BIND
          value: {{ .Values.aqsh.bind | default "0.0.0.0:8080" | quote }}
        - name: AQSH_TASKS_CONFIG
          value: {{ .Values.aqsh.tasksConfig | default "/etc/aqsh/tasks.yaml" | quote }}
        - name: AQSH_TASKS_DIR
          value: {{ .Values.aqsh.tasksDir | default "/tasks" | quote }}
        - name: AQSH_RESULTS_DIR
          value: {{ .Values.aqsh.resultsDir | default "/var/lib/aqsh/results" | quote }}
        - name: AQSH_REDIS_ADDR
          {{- if .Values.aqsh.redisAddr }}
          value: {{ .Values.aqsh.redisAddr | quote }}
          {{- else }}
          value: "localhost:6379"
          {{- end }}
        {{- if .Values.aqsh.redisSentinelAddrs }}
        - name: AQSH_REDIS_SENTINEL_ADDRS
          value: {{ .Values.aqsh.redisSentinelAddrs | quote }}
        {{- end }}
        - name: AQSH_REDIS_SENTINEL_MASTER
          value: {{ .Values.aqsh.redisSentinelMaster | default "mymaster" | quote }}
        {{- if .Values.aqsh.redisPassword }}
        - name: AQSH_REDIS_PASSWORD
          value: {{ .Values.aqsh.redisPassword | quote }}
        {{- end }}
        - name: AQSH_WORKER_CONCURRENCY
          value: {{ .Values.aqsh.workerConcurrency | default 10 | quote }}
        - name: AQSH_WORKER_QUEUES
          value: {{ .Values.aqsh.workerQueues | default "default" | quote }}
        - name: AQSH_IDENTITY_HEADER
          value: {{ .Values.aqsh.identityHeader | quote }}
        - name: AQSH_GROUPS_HEADER
          value: {{ .Values.aqsh.groupsHeader | quote }}
        - name: AQSH_REQUIRE_IDENTITY
          value: {{ .Values.aqsh.requireIdentity | default false | quote }}
        - name: AQSH_LOG_RETENTION
          value: {{ .Values.aqsh.logRetention | default "24h" | quote }}
        {{- if .Values.aqsh.resultRetention }}
        - name: AQSH_RESULT_RETENTION
          value: {{ .Values.aqsh.resultRetention | quote }}
        {{- end }}
        {{- with .Values.aqsh.extraEnvFrom }}
        envFrom:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        livenessProbe:
          {{- toYaml .Values.aqsh.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.aqsh.readinessProbe | nindent 10 }}
        resources:
          {{- toYaml .Values.aqsh.resources | nindent 10 }}
        volumeMounts:
        - name: aqsh-config
          mountPath: {{ .Values.aqsh.configMountPath | default "/etc/aqsh" | quote }}
          readOnly: true
        {{- if or .Values.aqsh.scripts .Values.aqsh.scriptsConfigMap.enabled }}
        - name: aqsh-scripts
          mountPath: {{ .Values.aqsh.scriptsMountPath | default "/scripts" | quote }}
          readOnly: true
        {{- end }}
      {{- if .Values.kubeAuthProxy.enabled }}
      {{- $tokenReviewUrl := .Values.kubeAuthProxy.tokenReviewUrl | default (printf "http://%s-kube-federated-auth:%v" .Release.Name .Values.kubeFederatedAuth.service.port) }}
      - name: kube-auth-proxy
        image: "{{ .Values.kubeAuthProxy.image.repository }}:{{ .Values.kubeAuthProxy.image.tag }}"
        imagePullPolicy: {{ .Values.kubeAuthProxy.image.pullPolicy }}
        args:
          - --upstream=http://localhost:{{ .Values.aqsh.service.port }}
          - --token-review-url={{ $tokenReviewUrl }}
          - --port={{ .Values.kubeAuthProxy.port }}
        ports:
          - containerPort: {{ .Values.kubeAuthProxy.port }}
            name: http-proxy
            protocol: TCP
        resources:
          {{- toYaml .Values.kubeAuthProxy.resources | nindent 10 }}
      {{- end }}
      {{- with .Values.aqsh.sidecars }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      volumes:
      - name: aqsh-config
        configMap:
          name: {{ .Release.Name }}-aqsh-config
      {{- if or .Values.aqsh.scripts .Values.aqsh.scriptsConfigMap.enabled }}
      - name: aqsh-scripts
        configMap:
          name: {{ .Release.Name }}-aqsh-scripts
          defaultMode: 0755
      {{- end }}
{{- end }}
