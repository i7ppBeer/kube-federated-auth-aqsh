apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: kube-federated-auth-aqsh
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    release: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: kube-federated-auth-aqsh
      release: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: kube-federated-auth-aqsh
        release: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
      - name: kube-federated-auth
        image: "{{ .Values.kubeFederatedAuth.image.repository }}:{{ .Values.kubeFederatedAuth.image.tag }}"
        imagePullPolicy: {{ .Values.kubeFederatedAuth.image.pullPolicy }}
        args:
        - --config=/etc/kube-federated-auth/clusters.yaml
        - --port=8443
        ports:
        - containerPort: 8443
          name: https
          protocol: TCP
        resources:
          {{- toYaml .Values.kubeFederatedAuth.resources | nindent 10 }}
        volumeMounts:
        - name: kfa-config
          mountPath: /etc/kube-federated-auth
          readOnly: true
        {{- if .Values.kubeFederatedAuth.remoteClusters }}
        - name: kfa-ca-certs
          mountPath: /etc/kube-federated-auth/ca-certs
          readOnly: true
        - name: kfa-tokens
          mountPath: /etc/kube-federated-auth/tokens
          readOnly: true
        {{- end }}
      - name: aqsh
        image: "{{ .Values.aqsh.image.repository }}:{{ .Values.aqsh.image.tag }}"
        imagePullPolicy: {{ .Values.aqsh.image.pullPolicy }}
        env:
        - name: AQSH_MODE
          value: {{ .Values.aqsh.mode | quote }}
        - name: AQSH_REDIS_ADDR
          value: "{{ .Release.Name }}-redis:{{ .Values.redis.service.port }}"
        - name: AQSH_IDENTITY_HEADER
          value: {{ .Values.aqsh.identityHeader | quote }}
        - name: AQSH_GROUPS_HEADER
          value: {{ .Values.aqsh.groupsHeader | quote }}
        - name: AQSH_REQUIRE_IDENTITY
          value: {{ .Values.aqsh.requireIdentity | quote }}
        - name: AQSH_TASKS_CONFIG
          value: "/etc/aqsh/tasks.yaml"
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        resources:
          {{- toYaml .Values.aqsh.resources | nindent 10 }}
        volumeMounts:
        - name: aqsh-config
          mountPath: /etc/aqsh
          readOnly: true
        {{- if .Values.aqsh.scripts }}
        - name: aqsh-scripts
          mountPath: /scripts
          readOnly: true
        {{- end }}
      volumes:
      - name: kfa-config
        configMap:
          name: {{ .Release.Name }}-kfa-config
      - name: aqsh-config
        configMap:
          name: {{ .Release.Name }}-aqsh-config
      {{- if .Values.aqsh.scripts }}
      - name: aqsh-scripts
        configMap:
          name: {{ .Release.Name }}-aqsh-scripts
          defaultMode: 0755
      {{- end }}
      {{- if .Values.kubeFederatedAuth.remoteClusters }}
      - name: kfa-ca-certs
        secret:
          secretName: {{ .Release.Name }}-kfa-certs
          items:
          {{- range .Values.kubeFederatedAuth.remoteClusters }}
          - key: {{ .name }}-ca.crt
            path: {{ .name }}-ca.crt
          {{- end }}
      - name: kfa-tokens
        secret:
          secretName: {{ .Release.Name }}-kfa-tokens
          items:
          {{- range .Values.kubeFederatedAuth.remoteClusters }}
          - key: {{ .name }}-token
            path: {{ .name }}-token
          {{- end }}
      {{- end }}
