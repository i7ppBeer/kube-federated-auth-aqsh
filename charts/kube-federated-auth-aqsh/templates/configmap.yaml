apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-kfa-config
  labels:
    app: kube-federated-auth-aqsh
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
data:
  clusters.yaml: |
{{ tpl (.Files.Get "files/clusters.yaml") . | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-aqsh-config
  labels:
    app: kube-federated-auth-aqsh
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
data:
  {{- $tasks := .Files.Get "files/tasks.yaml" }}
  {{- if .Values.aqsh.tasks }}{{ $tasks = .Values.aqsh.tasks }}{{ end }}
  tasks.yaml: |
{{ $tasks | indent 4 }}
---
{{- $hasValueScripts := .Values.aqsh.scripts }}
{{- $hasFileScripts := .Files.Glob "files/scripts/*" }}
{{- if or $hasValueScripts $hasFileScripts }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-aqsh-scripts
  labels:
    app: kube-federated-auth-aqsh
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
data:
  {{- if $hasValueScripts }}
  {{- range $name, $content := .Values.aqsh.scripts }}
  {{ $name }}: |
{{ $content | indent 4 }}
  {{- end }}
  {{- else }}
  {{- range $path, $content := $hasFileScripts }}
  {{ base $path }}: |
{{ $content | toString | indent 4 }}
  {{- end }}
  {{- end }}
{{- end }}
---
{{- $caCertFiles := .Files.Glob "files/ca-certs/*.crt" }}
{{- if $caCertFiles }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-kfa-ca-certs
  labels:
    app: kube-federated-auth-aqsh
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
data:
{{- range $path, $content := $caCertFiles }}
  {{ base $path }}: |
{{ $content | toString | indent 4 }}
{{- end }}
{{- end }}
