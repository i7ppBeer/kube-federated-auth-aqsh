{{- if .Values.kubeFederatedAuth.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-kfa-config
  labels:
    app: kube-federated-auth-aqsh
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
data:
  clusters.yaml: |
    authorized_clients:
    {{- range .Values.kubeFederatedAuth.authorizedClients }}
      - {{ . | quote }}
    {{- end }}

    cache:
      ttl: {{ .Values.kubeFederatedAuth.cache.ttl }}
      max_entries: {{ .Values.kubeFederatedAuth.cache.maxEntries }}

    renewal:
      interval: {{ .Values.kubeFederatedAuth.renewal.interval | quote }}
      token_duration: {{ .Values.kubeFederatedAuth.renewal.tokenDuration | quote }}
      renew_before: {{ .Values.kubeFederatedAuth.renewal.renewBefore | quote }}

    clusters:
      # Local cluster (self)
      {{ .Values.kubeFederatedAuth.clusterName }}:
        issuer: {{ .Values.kubeFederatedAuth.localCluster.issuer | quote }}
        ca_cert: {{ .Values.kubeFederatedAuth.localCluster.caCertPath | quote }}
        token_path: {{ .Values.kubeFederatedAuth.localCluster.tokenPath | quote }}
    {{- range .Values.kubeFederatedAuth.remoteClusters }}
      # Remote cluster: {{ .name }}
      {{ .name }}:
        issuer: {{ .issuer | quote }}
        api_server: {{ .apiServer | quote }}
        ca_cert: "/etc/kube-federated-auth/ca-certs/{{ .name }}-ca.crt"
        token_path: "/etc/kube-federated-auth/tokens/{{ .name }}-token"
    {{- end }}
---
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-aqsh-config
  labels:
    app: kube-federated-auth-aqsh
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
data:
  tasks.yaml: |
    tasks:
    {{- if .Values.aqsh.tasks }}
    {{- toYaml .Values.aqsh.tasks | nindent 4 }}
    {{- else }}
      {}
    {{- end }}
---
{{- if .Values.aqsh.scripts }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-aqsh-scripts
  labels:
    app: kube-federated-auth-aqsh
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
data:
{{- range $name, $content := .Values.aqsh.scripts }}
  {{ $name }}: |
{{ $content | indent 4 }}
{{- end }}
{{- end }}
---
{{- if .Values.kubeFederatedAuth.enabled }}
{{- $caCertFiles := .Files.Glob "files/ca-certs/*.crt" }}
{{- if $caCertFiles }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-kfa-ca-certs
  labels:
    app: kube-federated-auth-aqsh
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
data:
{{- range $path, $content := $caCertFiles }}
  {{ base $path }}: |
{{ $content | toString | indent 4 }}
{{- end }}
{{- end }}
{{- end }}
