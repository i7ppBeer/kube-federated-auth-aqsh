# ─────────────────────────────────────────────────────────────────────────────
# Combined chart: kube-federated-auth + aqsh (single Deployment)
# ─────────────────────────────────────────────────────────────────────────────

replicaCount: 1

# ── Scheduling ────────────────────────────────────────────────────────────────
nodeSelector: {}
#  kubernetes.io/arch: amd64

affinity: {}
#  nodeAffinity:
#    requiredDuringSchedulingIgnoredDuringExecution:
#      nodeSelectorTerms:
#        - matchExpressions:
#            - key: node-role.kubernetes.io/worker
#              operator: Exists

tolerations: []
#  - key: "node-role.kubernetes.io/control-plane"
#    operator: "Exists"
#    effect: "NoSchedule"

# ── Annotations ───────────────────────────────────────────────────────────────
# Annotations added to the Deployment metadata
annotations: {}

# Annotations added to the Pod template metadata
podAnnotations: {}
#  prometheus.io/scrape: "true"
#  prometheus.io/port: "8080"

# ── Sidecars ──────────────────────────────────────────────────────────────────
# Additional containers injected into the main Deployment pod
sidecars: []
#  - name: my-sidecar
#    image: nginx:alpine
#    ports:
#      - containerPort: 80

# ── kube-federated-auth ──────────────────────────────────────────────────────
kubeFederatedAuth:
  image:
    repository: rophy/kube-federated-auth
    tag: latest
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8443

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # Cluster role: central, sub-same-group, or sub-isolated
  clusterRole: central

  # Cluster name for this deployment
  clusterName: central

  # Authorized clients (who can call this kube-federated-auth instance)
  # Format: {cluster}/{namespace}/{serviceaccount}
  # Use * as wildcard
  authorizedClients:
    - "central/*/*"

  # Cache configuration
  cache:
    ttl: 60
    maxEntries: 1000

  # Token renewal configuration
  renewal:
    interval: "1h"
    tokenDuration: "168h"  # 7 days
    renewBefore: "48h"     # renew 48h before expiration

  # Local cluster configuration (always present)
  localCluster:
    # issuer must match the 'iss' claim in local SA tokens.
    # For kubeadm clusters this is typically "https://kubernetes.default.svc.cluster.local".
    # Verify with: kubectl create token default --duration=1m | cut -d. -f2 | base64 -d | jq .iss
    issuer: "https://kubernetes.default.svc.cluster.local"
    caCertPath: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    tokenPath: "/var/run/secrets/kubernetes.io/serviceaccount/token"

  # Remote clusters configuration
  # Each entry should have: name, issuer, apiServer, caCert, bootstrapToken
  #
  # issuer    — must match the 'iss' claim in that cluster's SA tokens (used for
  #             JWT matching and JWKS lookup). For kubeadm clusters this is usually
  #             "https://kubernetes.default.svc.cluster.local" — NOT the external URL.
  #             Verify: kubectl create token default --duration=1m | cut -d. -f2 | base64 -d | jq .iss
  # apiServer  — actual network-accessible API server URL (used for TokenReview and
  #             JWKS fetch when issuer is not publicly reachable)
  remoteClusters: []
  # Example:
  # - name: sub-1-1
  #   issuer: "https://kubernetes.default.svc.cluster.local"  # JWT iss claim (kubeadm default)
  #   apiServer: "https://10.1.1.1:6443"                      # actual network address
  #   caCert: |
  #     -----BEGIN CERTIFICATE-----
  #     ...
  #     -----END CERTIFICATE-----
  #   bootstrapToken: "eyJhbGc..."

# ── aqsh ─────────────────────────────────────────────────────────────────────
aqsh:
  image:
    repository: rophy/aqsh
    tag: latest
    pullPolicy: IfNotPresent

  # Mode: "both", "api", or "worker"
  mode: both

  service:
    type: ClusterIP
    port: 8080

  # Identity and group headers (from reverse proxy / kube-auth-proxy)
  identityHeader: "X-Forwarded-User"
  groupsHeader: "X-Forwarded-Groups"
  requireIdentity: true

  # Tasks and scripts are loaded from the chart's files/ directory:
  #   files/tasks.yaml        — task definitions (mounted at /etc/aqsh/tasks.yaml)
  #   files/scripts/<name>    — shell scripts    (mounted at /scripts/<name>, mode 0755)
  # Edit those files directly rather than setting values here.

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# ── kube-auth-proxy (sidecar) ────────────────────────────────────────────────
# Reverse proxy sidecar that validates Bearer tokens via kube-federated-auth
# and injects X-Forwarded-User/Groups/Extra-Cluster-Name headers to aqsh.
# When enabled, external traffic should target :4180 (proxy), not :8080 (aqsh).
kubeAuthProxy:
  enabled: false

  image:
    repository: ghcr.io/rophy/kube-auth-proxy
    tag: latest
    pullPolicy: IfNotPresent

  # Port the proxy listens on (external-facing)
  port: 4180

  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 20m
      memory: 32Mi

# ── Redis ─────────────────────────────────────────────────────────────────────
redis:
  enabled: true

  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 6379

  persistence:
    enabled: false
    # size: 1Gi
    # storageClass: ""

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

  nodeSelector: {}
  affinity: {}
  tolerations: []
  annotations: {}
  podAnnotations: {}

# ── ricoberger/vault-secrets-operator ────────────────────────────────────────
# Requires ricoberger/vault-secrets-operator installed in the cluster.
# Creates VaultSecret CRs (apiVersion: ricoberger.de/v1alpha1) which the
# operator reconciles into Kubernetes Secrets.
#
# Typical use: store remote cluster CA certs / bootstrap tokens in Vault
# under paths matching "<release>-kfa-certs" / "<release>-kfa-tokens" so the
# Deployment can consume them without embedding secrets in values.yaml.
vaultSecrets:
  enabled: false

  # List of VaultSecret resources to create
  secrets: []
  # - name: kfa-tokens               # VaultSecret CR name (= K8s Secret name)
  #   path: kvv2/kube-federated-auth/tokens  # full Vault path (mount included)
  #   type: Opaque                    # K8s Secret type (default: Opaque)

# ── Reader (optional — deploy on sub clusters) ────────────────────────────────
# Installs a lightweight ServiceAccount + RBAC for token review
reader:
  enabled: false
  serviceAccountName: kube-federated-auth-reader
  namespace: kube-system

# ── Shared ServiceAccount ─────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: kube-federated-auth-aqsh
  annotations: {}

# ── Istio VirtualService ──────────────────────────────────────────────────────
istio:
  virtualService:
    enabled: false
    # Hostnames this VirtualService applies to
    hosts: []
    #  - kube-federated-auth.example.com
    # Istio Gateways to attach to
    gateways: []
    #  - istio-system/ingressgateway
    # TLS routes for kube-federated-auth (:8443)
    # Uses Istio tls match (SNI-based) — service port is named 'https'
    tls: []
    #  - match:
    #      - port: 443
    #        sniHosts:
    #          - kube-federated-auth.example.com
    #    route:
    #      - destination:
    #          host: <release>-kube-federated-auth
    #          port:
    #            number: 8443
