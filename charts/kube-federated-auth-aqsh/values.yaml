# ──────────────────────────────────────────────────────────────────────────────
# kube-federated-auth-aqsh — independent Deployments
#   Deployment 1: <release>-kube-federated-auth  (kube-federated-auth)
#   Deployment 2: <release>-aqsh                 (aqsh + optional kube-auth-proxy sidecar)
#   Deployment 3: <release>-redis                (Redis)
# ──────────────────────────────────────────────────────────────────────────────

replicaCount: 1

# ── Scheduling ────────────────────────────────────────────────────────────────
nodeSelector: {}
#  kubernetes.io/arch: amd64

affinity: {}
#  nodeAffinity:
#    requiredDuringSchedulingIgnoredDuringExecution:
#      nodeSelectorTerms:
#        - matchExpressions:
#            - key: node-role.kubernetes.io/worker
#              operator: Exists

tolerations: []
#  - key: "node-role.kubernetes.io/control-plane"
#    operator: "Exists"
#    effect: "NoSchedule"

# ── kube-federated-auth ───────────────────────────────────────────────────────
kubeFederatedAuth:
  enabled: true

  image:
    repository: rophy/kube-federated-auth
    tag: latest
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8443
    annotations: {}
    #  cloud.google.com/neg: '{"ingress": true}'

  # Annotations for the kube-federated-auth Deployment metadata
  annotations: {}
  # Annotations for the kube-federated-auth Pod template
  podAnnotations: {}

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # clusterRole describes this cluster's role in the federation topology.
  # Used for documentation and to guide authorizedClients / remoteClusters config.
  # Values: central | sub-same-group | sub-isolated
  #   central        — knows all sub clusters; authorizedClients lists every sub SA
  #   sub-same-group — peers within the same network group (e.g. 100.x); mutual auth
  #   sub-isolated   — standalone sub cluster; no peer-to-peer token validation
  # NOTE: this field is informational only and is not passed to the binary.
  clusterRole: central

  # Cluster name for this deployment
  clusterName: central

  # Authorized clients (who can call this kube-federated-auth instance)
  # Format: {cluster}/{namespace}/{serviceaccount}
  # Use * as wildcard
  authorizedClients:
    - "central/*/*"

  # Cache configuration
  cache:
    ttl: 60
    maxEntries: 1000

  # Token renewal configuration
  renewal:
    interval: "1h"
    tokenDuration: "168h"  # 7 days
    renewBefore: "48h"     # renew 48h before expiration

  # Local cluster configuration (always present)
  localCluster:
    # issuer must match the 'iss' claim in local SA tokens.
    # For kubeadm clusters this is typically "https://kubernetes.default.svc.cluster.local".
    # Verify with: kubectl create token default --duration=1m | cut -d. -f2 | base64 -d | jq .iss
    issuer: "https://kubernetes.default.svc.cluster.local"
    caCertPath: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    tokenPath: "/var/run/secrets/kubernetes.io/serviceaccount/token"

  # Remote clusters configuration
  # Each entry should have: name, issuer, apiServer, caCert, bootstrapToken
  #
  # issuer    — must match the 'iss' claim in that cluster's SA tokens (used for
  #             JWT matching and JWKS lookup). For kubeadm clusters this is usually
  #             "https://kubernetes.default.svc.cluster.local" — NOT the external URL.
  #             Verify: kubectl create token default --duration=1m | cut -d. -f2 | base64 -d | jq .iss
  # apiServer  — actual network-accessible API server URL (used for TokenReview and
  #             JWKS fetch when issuer is not publicly reachable)
  remoteClusters: []
  # Example:
  # - name: sub-1-1
  #   issuer: "https://kubernetes.default.svc.cluster.local"  # JWT iss claim (kubeadm default)
  #   apiServer: "https://10.1.1.1:6443"                      # actual network address
  #
  #   # caCert (optional): inline PEM. If omitted, place the cert at
  #   #   files/ca-certs/<name>-ca.crt and it will be mounted via ConfigMap.
  #   caCert: ""
  #
  #   # bootstrapToken (optional): inline SA token for first-time auth to the
  #   #   remote cluster. If omitted, provide Secret <release>-kfa-tokens
  #   #   externally (e.g. vaultSecrets) with key <name>-token before deploying.
  #   #   Never commit a real token to git.
  #   bootstrapToken: ""

# ── aqsh ──────────────────────────────────────────────────────────────────────
aqsh:
  enabled: true

  # Override AQSH_REDIS_ADDR (e.g. "my-redis:6379").
  # If empty, defaults to "<release>-redis:<redis.service.port>".
  redisAddr: ""

  image:
    repository: rophy/aqsh
    tag: latest
    pullPolicy: IfNotPresent

  # Mode: "both", "api", or "worker"
  mode: both

  service:
    type: ClusterIP
    port: 8080
    # Custom Service name. If empty, defaults to "<release>-aqsh".
    name: ""
    annotations: {}
    #  prometheus.io/scrape: "true"

  # Annotations for the aqsh Deployment metadata
  annotations: {}
  # Annotations for the aqsh Pod template
  podAnnotations: {}
  #  prometheus.io/scrape: "true"
  #  prometheus.io/port: "8080"

  # Additional sidecar containers injected into the aqsh Deployment pod
  sidecars: []
  #  - name: my-sidecar
  #    image: nginx:alpine
  #    ports:
  #      - containerPort: 80

  # Identity and group headers (from reverse proxy / kube-auth-proxy)
  identityHeader: "X-Forwarded-User"
  groupsHeader: "X-Forwarded-Groups"
  requireIdentity: true

  # Optional top-level defaults applied to all tasks (mounted at /etc/aqsh/tasks.yaml).
  # These values are used when a task does not define them explicitly.
  defaults: {}
  # timeout: 5m
  # max_retry: 3
  # retry_delay: 30s
  # queue: default
  # log_retention: 24h

  # Task definitions (mounted at /etc/aqsh/tasks.yaml).
  # Format: map[string]TaskDef — key is the task name (aqsh native map schema).
  tasks: {}
  # deploy:
  #   script: /scripts/deploy.sh
  #   description: "Deploy application"
  #   timeout: 10m
  #   max_retry: 2
  #   queue: default
  #   allowed_groups:
  #     - deploy-team
  #     - system:serviceaccounts:ops
  #   input:
  #     - name: version
  #       env: VERSION
  #       required: true
  #       type: string
  #       pattern: '^v?\d+\.\d+\.\d+$'

  # Shell scripts mounted at /scripts/<name> (mode 0755)
  scripts: {}
  # deploy.sh: |
  #   #!/bin/bash
  #   set -euo pipefail
  #   echo "Deploying $VERSION to $ENVIRONMENT (submitter: $AQSH_SUBMITTER)"

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# ── kube-auth-proxy (sidecar) ─────────────────────────────────────────────────
# Reverse proxy sidecar that validates Bearer tokens via kube-federated-auth
# and injects X-Forwarded-User/Groups/Extra-Cluster-Name headers to aqsh.
# When enabled, external traffic should target :4180 (proxy), not :8080 (aqsh).
kubeAuthProxy:
  enabled: false

  # Override --token-review-url.
  # If empty, defaults to "http://<release>-kube-federated-auth:<kubeFederatedAuth.service.port>".
  tokenReviewUrl: ""

  image:
    repository: ghcr.io/rophy/kube-auth-proxy
    tag: latest
    pullPolicy: IfNotPresent

  # Port the proxy listens on (external-facing)
  port: 4180

  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 20m
      memory: 32Mi

# ── Redis ─────────────────────────────────────────────────────────────────────
redis:
  enabled: true

  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 6379

  persistence:
    enabled: false
    size: 1Gi
    # storageClass: ""

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

  nodeSelector: {}
  affinity: {}
  tolerations: []
  annotations: {}
  podAnnotations: {}

# ── ricoberger/vault-secrets-operator ────────────────────────────────────────
# Requires ricoberger/vault-secrets-operator installed in the cluster.
# Creates VaultSecret CRs (apiVersion: ricoberger.de/v1alpha1) which the
# operator reconciles into Kubernetes Secrets.
#
# Typical use: store remote cluster CA certs / bootstrap tokens in Vault
# under paths matching "<release>-kfa-certs" / "<release>-kfa-tokens" so the
# Deployment can consume them without embedding secrets in values.yaml.
vaultSecrets:
  enabled: false

  # List of VaultSecret resources to create
  secrets: []
  # - name: kfa-tokens               # VaultSecret CR name (= K8s Secret name)
  #   path: kvv2/kube-federated-auth/tokens  # full Vault path (mount included)
  #   type: Opaque                    # K8s Secret type (default: Opaque)

# ── Reader (optional — deploy on sub clusters) ────────────────────────────────
# Installs a lightweight ServiceAccount + RBAC for token review
reader:
  enabled: false
  serviceAccountName: kube-federated-auth-reader
  namespace: kube-system

# ── Shared ServiceAccount ─────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: kube-federated-auth-aqsh
  annotations: {}

# ── Istio VirtualService ──────────────────────────────────────────────────────
istio:
  virtualService:
    enabled: false
    # Hostnames this VirtualService applies to
    hosts: []
    #  - aqsh.example.com
    # Istio Gateways to attach to
    gateways: []
    #  - istio-system/ingressgateway
    #  - istio-system/internal-gateway
    # When true, auto-generates a catch-all http route to the aqsh service.
    # Targets kubeAuthProxy.port (4180) if kubeAuthProxy.enabled, else aqsh.service.port (8080).
    autoRouteToAqsh: true
    # Additional custom http routes (inserted before the auto-route).
    http: []
    #  - match:
    #      - uri:
    #          prefix: /healthz
    #    route:
    #      - destination:
    #          host: my-service
    #          port:
    #            number: 8080

# ── Usage Examples ────────────────────────────────────────────────────────────
# Example: only aqsh + kube-auth-proxy (kube-federated-auth already deployed elsewhere)
#
# kubeFederatedAuth:
#   enabled: false
#
# aqsh:
#   enabled: true
#   redisAddr: "my-existing-redis:6379"
#
# redis:
#   enabled: false
#
# kubeAuthProxy:
#   enabled: true
#   tokenReviewUrl: "http://my-existing-kube-federated-auth:8443"
#   port: 4180
