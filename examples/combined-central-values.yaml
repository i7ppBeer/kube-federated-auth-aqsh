# Central cluster example — kube-federated-auth-aqsh
# Deploys kube-federated-auth, aqsh, and Redis as independent Deployments

replicaCount: 1

kubeFederatedAuth:
  image:
    repository: null-ptr-exception/kube-federated-auth
    tag: latest
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8443

  annotations: {}
  podAnnotations: {}

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

  # clusterRole: informational only (not passed to binary)
  #   central        — manages all sub clusters
  #   sub-same-group — peers within the same network group
  #   sub-isolated   — standalone sub cluster
  clusterRole: central
  clusterName: central

  authorizedClients:
    - "central/*/*"
    - "sub-1-1/*/*"
    - "sub-1-2/*/*"
    - "sub-2-1/*/*"
    - "sub-2-2/*/*"

  cache:
    ttl: 60
    maxEntries: 1000

  renewal:
    interval: "1h"
    tokenDuration: "168h"
    renewBefore: "48h"

  localCluster:
    issuer: "https://kubernetes.default.svc.cluster.local"
    caCertPath: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    tokenPath: "/var/run/secrets/kubernetes.io/serviceaccount/token"

  remoteClusters:
    - name: sub-1-1
      issuer: "https://sub-1-1.example.com:6443"
      apiServer: "https://10.1.1.1:6443"
      caCert: |
        -----BEGIN CERTIFICATE-----
        # Replace with actual CA certificate for sub-1-1
        -----END CERTIFICATE-----
      bootstrapToken: "eyJhbGci..."  # Replace with actual bootstrap token

    - name: sub-1-2
      issuer: "https://sub-1-2.example.com:6443"
      apiServer: "https://10.1.1.2:6443"
      caCert: |
        -----BEGIN CERTIFICATE-----
        # Replace with actual CA certificate for sub-1-2
        -----END CERTIFICATE-----
      bootstrapToken: "eyJhbGci..."

    - name: sub-2-1
      issuer: "https://sub-2-1.example.com:6443"
      apiServer: "https://10.1.2.1:6443"
      caCert: |
        -----BEGIN CERTIFICATE-----
        # Replace with actual CA certificate for sub-2-1
        -----END CERTIFICATE-----
      bootstrapToken: "eyJhbGci..."

    - name: sub-2-2
      issuer: "https://sub-2-2.example.com:6443"
      apiServer: "https://10.1.2.2:6443"
      caCert: |
        -----BEGIN CERTIFICATE-----
        # Replace with actual CA certificate for sub-2-2
        -----END CERTIFICATE-----
      bootstrapToken: "eyJhbGci..."

aqsh:
  image:
    repository: null-ptr-exception/aqsh
    tag: latest
    pullPolicy: IfNotPresent

  mode: both

  service:
    type: ClusterIP
    port: 8080

  annotations: {}
  podAnnotations: {}
  sidecars: []

  identityHeader: "X-Forwarded-User"
  groupsHeader: "X-Forwarded-Groups"
  requireIdentity: true

  # Task definitions (aqsh native map schema)
  tasks:
    deploy:
      script: /scripts/deploy.sh
      description: "Deploy application"
      allowed_groups:
        - deploy-team
      input:
        - name: version
          env: VERSION
          required: true
          type: string

  # Shell scripts (mounted at /scripts/<name>, mode 0755)
  scripts:
    deploy.sh: |
      #!/bin/bash
      set -euo pipefail
      echo "Deploying $VERSION (submitter: $AQSH_SUBMITTER)"

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

redis:
  enabled: true

  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 6379

  persistence:
    enabled: false

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# reader is disabled on central — enable on sub clusters
reader:
  enabled: false
  serviceAccountName: kube-federated-auth-reader
  namespace: kube-system

serviceAccount:
  create: true
  name: kube-federated-auth-aqsh
  annotations: {}
