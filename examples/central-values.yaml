# Central Cluster Configuration
# This cluster knows all 4 sub clusters via 10.x network

image:
  repository: rophy/kube-federated-auth
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 8443

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

clusterRole: central
clusterName: central

# Central can receive requests from all clusters
authorizedClients:
  - "central/*/*"
  - "sub-1-1/*/*"
  - "sub-1-2/*/*"
  - "sub-2-1/*/*"
  - "sub-2-2/*/*"

cache:
  ttl: 60
  maxEntries: 1000

renewal:
  interval: "1h"
  tokenDuration: "168h"
  renewBefore: "48h"

localCluster:
  issuer: "https://kubernetes.default.svc.cluster.local"
  caCertPath: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
  tokenPath: "/var/run/secrets/kubernetes.io/serviceaccount/token"

# Remote clusters via 10.x network
remoteClusters:
  - name: sub-1-1
    issuer: "https://sub-1-1.example.com:6443"
    apiServer: "https://10.1.1.1:6443"
    caCert: |
      -----BEGIN CERTIFICATE-----
      # Replace with actual CA certificate for sub-1-1
      -----END CERTIFICATE-----
    bootstrapToken: "eyJhbGci..."  # Replace with actual bootstrap token

  - name: sub-1-2
    issuer: "https://sub-1-2.example.com:6443"
    apiServer: "https://10.1.1.2:6443"
    caCert: |
      -----BEGIN CERTIFICATE-----
      # Replace with actual CA certificate for sub-1-2
      -----END CERTIFICATE-----
    bootstrapToken: "eyJhbGci..."  # Replace with actual bootstrap token

  - name: sub-2-1
    issuer: "https://sub-2-1.example.com:6443"
    apiServer: "https://10.1.2.1:6443"
    caCert: |
      -----BEGIN CERTIFICATE-----
      # Replace with actual CA certificate for sub-2-1
      -----END CERTIFICATE-----
    bootstrapToken: "eyJhbGci..."  # Replace with actual bootstrap token

  - name: sub-2-2
    issuer: "https://sub-2-2.example.com:6443"
    apiServer: "https://10.1.2.2:6443"
    caCert: |
      -----BEGIN CERTIFICATE-----
      # Replace with actual CA certificate for sub-2-2
      -----END CERTIFICATE-----
    bootstrapToken: "eyJhbGci..."  # Replace with actual bootstrap token

serviceAccount:
  create: true
  name: kube-federated-auth
  annotations: {}
