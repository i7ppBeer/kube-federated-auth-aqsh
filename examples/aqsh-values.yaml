# AQSH Configuration (applicable to all clusters)
# Each cluster deploys its own aqsh + Redis instance

aqsh:
  image:
    repository: rophy/aqsh
    tag: latest
    pullPolicy: IfNotPresent

  replicaCount: 1

  # Mode: "both" for small environments (API + worker in one pod)
  # Use "api" and "worker" separately for larger deployments
  mode: both

  service:
    type: ClusterIP
    port: 8080

  # Identity headers from kube-auth-proxy or reverse proxy
  identityHeader: "X-Forwarded-User"
  groupsHeader: "X-Forwarded-Groups"
  requireIdentity: true

  # Define your tasks
  tasksConfig: |
    tasks:
      - name: hello
        script: /scripts/hello.sh
        description: "Simple hello task"
        allowed_groups:
          - "system:authenticated"

      - name: deploy
        script: /scripts/deploy.sh
        description: "Deployment task"
        allowed_groups:
          - "system:masters"
          - "deployers"
        inputs:
          - name: environment
            type: string
            required: true
            validation: "^(dev|staging|prod)$"
          - name: version
            type: string
            required: true

  # Shell scripts for tasks
  scripts:
    hello.sh: |
      #!/bin/bash
      echo "Hello from aqsh!"
      echo "Task submitted by: $AQSH_SUBMITTER"
      echo "Task ID: $AQSH_TASK_ID"
      date

    deploy.sh: |
      #!/bin/bash
      echo "Deploying to environment: $INPUT_ENVIRONMENT"
      echo "Version: $INPUT_VERSION"
      echo "Submitted by: $AQSH_SUBMITTER"

      # Add your deployment logic here
      # This is just an example
      kubectl get pods -n $INPUT_ENVIRONMENT || true
      echo "Deployment completed!"

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

redis:
  enabled: true

  image:
    repository: redis
    tag: 7-alpine
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 6379

  persistence:
    enabled: false
    # Enable if you need persistent storage for task history
    # size: 1Gi
    # storageClass: "standard"

  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

serviceAccount:
  create: true
  name: aqsh
  annotations: {}
